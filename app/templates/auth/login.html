{% extends "base.html" %}

{% block title %}Anmelden — DropBid{% endblock %}

{% block content %}
<div class="db-auth-wrap">
    <div class="db-card-panel">
        <div class="db-panel-head">
            <div class="db-tag">DropBid</div>
            <h2>Anmelden</h2>
        </div>
        <div class="db-panel-body">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="db-field">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" class="db-input" placeholder="du@beispiel.de" required>
                </div>
                <div class="db-field">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" class="db-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="db-btn db-btn-primary db-btn-block">Anmelden</button>
            </form>
            <div class="db-form-foot">
                Noch kein Konto? <a href="{{ url_for('auth.register') }}">Registrieren</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
